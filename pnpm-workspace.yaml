packages:
  - packages/*
  - apps/*

preferWorkspacePackages: true

publicHoistPattern:
  - '@commandkit/*'

allowBuilds:
  '@swc/core': false
  cbor-extract: false
  core-js: false
  esbuild: true
  msgpackr-extract: false

catalogs:
  discordjs:
    discord.js: ^14.27.0
  build:
    typescript: ^5.9.3
    tsdown: ^0.22.12
  workflow:
    workflow: ^4.6.0
    '@workflow/builders': ^4.1.1
    '@workflow/rollup': ^4.0.11

minimumReleaseAgeExclude:
  - '@ai-sdk/gateway@4.0.24'
  - '@ai-sdk/google@4.0.19'
  - '@hono/node-server@2.0.11'
  - '@posthog/core@1.44.0'
  - ai@7.0.32
  - posthog-node@5.46.0
